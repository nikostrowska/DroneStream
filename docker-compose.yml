services:
  dotnet:
    image: backend:latest
    ports:
      - "4001:4001"
    build:
      context: backend
    container_name: backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:4001
    depends_on:
      - emqx
    networks:
      - backend
      - emqx

  react:
    image: frontend:latest
    ports:
      - "4000:4000"
    build:
      context: frontend
    container_name: frontend
    command: ["npm", "run", "dev"]
    networks:
      - backend

  mediamtx:
    image: bluenviron/mediamtx:latest
    build:
      context: mediamtx
    restart: always
    ports:
      - "1935:1935"
      - "8889:8889"
      - "8189:8189/udp"
    container_name: mediamtx
    environment:
      # - MTX_WEBRTCADDITIONALHOSTS=192.168.49.212 # Set this to your IP address
    networks:
      - mediamtx_net
  emqx:
    image: emqx/emqx:5.8.0
    container_name: emqx
    ports:
      - 1883:1883
      - 8083:8083
      - 8084:8084
    environment:
      - EMQX_NODE__COOKIE="mycookie"
    networks:
      - emqx

networks:
  emqx:
  backend:
  mediamtx_net:
    driver: bridge
    ipam:
      driver: default
